<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic HTML and CSS</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <h1>My First Heading</h1>
    <p>This is a sample paragraph to style with CSS.</p>
    
    <div class="box">
        This is a box with a background color and padding using a class selector.
    </div>
    <div id="unique-box">
        This is a box with a different background color and padding using an ID selector.
    </div>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>

</body>
</html>
